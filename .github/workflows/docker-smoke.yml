name: docker-smoke
on:
  pull_request:
  push:
    branches: [main]
jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t bash-stakeholder .
      - run: docker run --rm bash-stakeholder --list-values
      - run: docker run --rm bash-stakeholder --output-format json --focus-family code_analyzer --seed 123
      - run: docker run --rm bash-stakeholder --output-format json --focus-family platform_engineering --seed 987
      - run: '! docker run --rm bash-stakeholder --experimental-provider local-demo'
