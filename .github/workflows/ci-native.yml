name: ci-native
on:
  pull_request:
  push:
    branches: [main]
jobs:
  ci-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - run: python3 scripts/validate_scaffold.py
      - run: shfmt -d bin/stakeholder tests/test_cli.sh
      - run: shellcheck bin/stakeholder tests/test_cli.sh
      - run: tests/test_cli.sh bin/stakeholder
